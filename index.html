<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICEbreaker🌸 PRO</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: #fff0f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Hiệu ứng hoa rơi */
        .sakura {
            position: absolute;
            top: -10%;
            background: #ffb7c5;
            border-radius: 100% 0 100% 100%;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Header */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid #ffb7c5;
            color: #d85971;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 10;
        }

        /* Khu vực chat */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .msg {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background-color: #d85971;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: white;
            color: #333;
            border: 1px solid #ffb7c5;
            border-bottom-left-radius: 2px;
        }

        /* Ô nhập liệu */
        .input-box {
            padding: 10px;
            background: white;
            display: flex;
            align-items: center;
            border-top: 1px solid #ffb7c5;
            z-index: 10;
        }

        input {
            flex: 1;
            border: 1px solid #ffb7c5;
            padding: 12px 15px;
            border-radius: 25px;
            outline: none;
            font-size: 16px; /* Tránh zoom trên iPhone */
        }

        button {
            background: none;
            border: none;
            color: #d85971;
            font-weight: bold;
            margin-left: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        pre {
            background: #2d2d2d;
            color: #ccc;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>ICEbreaker🌸 PRO</header>

<div id="chat-window">
    <div class="msg ai-msg">Chào mày! Tao là ICEbreaker🌸. Tao có thể viết code Lua Roblox cho mày cực nhanh. Hỏi gì đi?</div>
</div>

<div class="input-box">
    <input type="text" id="user-input" placeholder="Hỏi code Lua...">
    <button onclick="handleSend()">Gửi</button>
</div>

<script>
    // Tạo cánh hoa rơi
    for(let i=0; i<20; i++) {
        let flower = document.createElement('div');
        flower.className = 'sakura';
        flower.style.left = Math.random() * 100 + 'vw';
        flower.style.width = Math.random() * 8 + 4 + 'px';
        flower.style.height = flower.style.width;
        flower.style.animationDuration = Math.random() * 3 + 4 + 's';
        flower.style.delay = Math.random() * 5 + 's';
        document.body.appendChild(flower);
    }

    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('user-input');

    function handleSend() {
        const text = input.value.trim();
        if(!text) return;

        // Hiện tin nhắn của mày
        addMessage(text, 'user-msg');
        input.value = '';

        // Giả lập AI trả lời (Để có AI thật, mày cần gắn API Key vào đây)
        setTimeout(() => {
            let aiResponse = "Tao đang xử lý yêu cầu: " + text + "\n\n(Lưu ý: Để tao thông minh như thật, mày cần gắn API của Gemini hoặc OpenAI vào code này nhé!)";
            
            if(text.toLowerCase().includes('lua')) {
                aiResponse = "Đây là code Lua cơ bản cho mày:\n<pre>print('Hello Baddie!')\nlocal part = Instance.new('Part')\npart.Parent = game.Workspace</pre>";
            }
            
            addMessage(aiResponse, 'ai-msg');
        }, 800);
    }

    function addMessage(content, className) {
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerHTML = content;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Nhấn Enter để gửi
    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSend();
    });
</script>

</body>
</html>
