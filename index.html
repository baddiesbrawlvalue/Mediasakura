<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICEbreaker🌸 PRO</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #fff0f5; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .sakura { position: absolute; top: -10%; background: #ffb7c5; border-radius: 100% 0 100% 100%; animation: fall linear infinite; pointer-events: none; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        header { padding: 15px; text-align: center; background: white; border-bottom: 2px solid #ffb7c5; color: #d85971; font-weight: bold; z-index: 10; }
        #key-config { padding: 10px; background: #fffafb; border-bottom: 1px solid #ffb7c5; z-index: 10; display: flex; gap: 5px; }
        #api-key { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid #ffb7c5; font-size: 12px; outline: none; }
        #save-key { background: #d85971; color: white; border: none; border-radius: 10px; padding: 0 10px; font-size: 11px; cursor: pointer; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 10; padding-bottom: 80px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #d85971; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: white; color: #333; border: 1px solid #ffb7c5; border-bottom-left-radius: 4px; }
        pre { background: #282c34; color: #abb2bf; padding: 10px; border-radius: 10px; font-size: 13px; overflow-x: auto; margin: 10px 0; white-space: pre-wrap; word-break: break-all; }
        .input-box { position: fixed; bottom: 0; width: 100%; padding: 12px; background: white; display: flex; border-top: 1px solid #ffb7c5; z-index: 100; }
        #user-input { flex: 1; border: 1px solid #ffb7c5; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        #send-btn { background: #d85971; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>ICEbreaker🌸 PRO</header>

<div id="key-config">
    <input type="password" id="api-key" placeholder="AIzaSyBfoLI4hPFecDMQEor4ockt86YHQZlhIo8">
    <button id="save-key" onclick="saveKey()">LƯU KEY</button>
</div>

<div id="chat-window">
    <div class="msg ai-msg">Chào mày! Dán Key rồi nhấn LƯU KEY để bắt đầu.</div>
</div>

<div class="input-box">
    <input type="text" id="user-input" placeholder="Hỏi code Lua...">
    <button id="send-btn" onclick="handleSend()">GỬI</button>
</div>

<script>
    window.onload = () => {
        const savedKey = localStorage.getItem('icebreaker_key');
        if (savedKey) {
            document.getElementById('api-key').value = savedKey;
            addMessage("🌸 Đã tự động nhận Key.", "ai-msg");
        }
    };

    function saveKey() {
        const key = document.getElementById('api-key').value;
        localStorage.setItem('icebreaker_key', key);
        alert("Đã lưu Key!");
    }

    function addMessage(content, className, id = null) {
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        if(id) div.id = id;
        div.innerHTML = content;
        document.getElementById('chat-window').appendChild(div);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    async function handleSend() {
        const text = document.getElementById('user-input').value.trim();
        const key = localStorage.getItem('icebreaker_key') || document.getElementById('api-key').value.trim();

        if(!text || !key) return;

        addMessage(text, 'user-msg');
        document.getElementById('user-input').value = '';

        const loadingId = "loading-" + Date.now();
        addMessage("🌸...", "ai-msg", loadingId);

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [
                        {role: "system", content: "Mày là ICEbreaker, AI chuyên Lua Roblox. Nói chuyện mày tao."},
                        {role: "user", content: text}
                    ]
                })
            });
            const data = await response.json();
            document.getElementById(loadingId).remove();
            let res = data.choices[0].message.content.replace(/```(?:lua)?([\s\S]*?)
```/g, '<pre>$1</pre>').replace(/\n/g, '<br>');
            addMessage(res, 'ai-msg');
        } catch (e) {
            if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            addMessage("Lỗi kết nối!", "ai-msg");
        }
    }

    for(let i=0; i<15; i++) {
        let f = document.createElement('div'); f.className = 'sakura';
        f.style.left = Math.random()*100+'vw'; f.style.width = f.style.height = Math.random()*7+5+'px';
        f.style.animationDuration = Math.random()*4+3+'s'; document.body.appendChild(f);
    }
    document.getElementById('user-input').addEventListener("keypress", (e) => { if(e.key === "Enter") handleSend(); });
</script>
</body>
</html>
