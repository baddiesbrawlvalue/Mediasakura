<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SakuraTok - ICEbreaker Final Version</title>
    <style>
        :root { --pink: #ff4d6d; --sakura: #ffb7c5; }
        body { margin: 0; background: black; font-family: sans-serif; color: white; overflow: hidden; }
        
        /* Layout & Feed */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .post { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .post video, .post img { max-height: 100%; max-width: 100%; object-fit: contain; }

        /* UI Overlay */
        .overlay-ui { position: absolute; bottom: 90px; left: 15px; right: 70px; z-index: 5; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .side-ui { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 10; }
        .icon-btn { font-size: 32px; cursor: pointer; text-align: center; }
        .stat-label { font-size: 13px; font-weight: bold; margin-top: -3px; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: black; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 100; }
        .nav-item { color: white; text-align: center; font-size: 11px; opacity: 0.6; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--pink); }
        .add-btn { background: white; color: black; padding: 5px 16px; border-radius: 10px; font-size: 24px; font-weight: bold; }

        /* Profile Page */
        #profilePage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 200; overflow-y: auto; padding-bottom: 90px; }
        .profile-header { padding: 50px 20px 30px; text-align: center; }
        .avt-large { width: 95px; height: 95px; border-radius: 50%; border: 3px solid var(--pink); object-fit: cover; }
        .stats-bar { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-num { font-size: 19px; font-weight: bold; display: block; }
        .verified-icon { width: 18px; vertical-align: middle; display: none; }

        /* Modals & Popups */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 25px; border-radius: 20px; z-index: 400; width: 85%; max-width: 350px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 350; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-confirm { background: var(--pink); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div id="mainFeed"></div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showHome()">🏠<br>Trang chủ</div>
    <div class="add-btn" onclick="openUpload()">+</div>
    <div class="nav-item" onclick="showProfile()">👤<br>Hồ sơ</div>
</div>

<div id="profilePage">
    <div class="profile-header">
        <img id="pAvt" src="https://i.imgur.com/8Km9tLL.png" class="avt-large">
        <h3 id="pName">ICEbreaker <img id="pVerify" class="verified-icon" src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg"></h3>
        <p id="pBio" style="color:#666">Admin SakuraTok 🌸</p>
        <div class="stats-bar">
            <div style="text-align:center"><span class="stat-num" id="sFollowing">0</span><span style="font-size:12px;color:#999">Đang Follow</span></div>
            <div style="text-align:center"><span class="stat-num" id="sFollowers">0</span><span style="font-size:12px;color:#999">Follower</span></div>
            <div style="text-align:center"><span class="stat-num" id="sLikes">0</span><span style="font-size:12px;color:#999">Tim</span></div>
        </div>
        <button style="background:#f1f1f1; border:none; padding:8px 30px; border-radius:5px; font-weight:bold;">Sửa hồ sơ</button>
    </div>
    <div id="profileGrid" style="display:grid; grid-template-columns: repeat(3,1fr); gap:2px;"></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal" id="modalVerifyNotify">
    <h2 style="color:var(--pink); margin-top:0;">Chúc mừng! 🎉</h2>
    <p>Bạn đã đạt hơn 100K Follower. Bạn có muốn nhận Tích Xanh chính chủ không?</p>
    <button class="btn-confirm" onclick="openSurvey()">CHẤP NHẬN</button>
    <button style="width:100%; background:none; border:none; margin-top:10px; color:#999;" onclick="closeModals()">Bỏ qua</button>
</div>

<div class="modal" id="modalSurvey">
    <h3 style="margin-top:0">Khảo sát Tích Xanh</h3>
    <label style="font-size:13px">Bạn đã coi & làm TikTok bao lâu rồi?</label>
    <input type="text" id="q1" placeholder="Ví dụ: 2 năm...">
    <label style="font-size:13px">Mục tiêu sáng tạo của bạn là gì?</label>
    <textarea id="q2" rows="2" placeholder="Ví dụ: Làm clip vui cho mọi người..."></textarea>
    <button class="btn-confirm" onclick="finishVerify()">HOÀN TẤT & NHẬN TÍCH XANH</button>
</div>

<div class="modal" id="modalUpload">
    <h3>Đăng clip mới 🌸</h3>
    <input type="file" id="fileInp" accept="video/*,image/*">
    <button class="btn-confirm" onclick="handleUpload()">ĐĂNG NGAY</button>
    <button style="width:100%; background:none; border:none; margin-top:10px; color:#999;" onclick="closeModals()">Đóng</button>
</div>

<script>
    const ADMIN = "ICEbreaker";
    let posts = JSON.parse(localStorage.getItem('it_posts')) || [];
    let stats = JSON.parse(localStorage.getItem('it_stats')) || { following: 120, followers: 99800, likes: 650000, hasVerify: false, notified: false };

    function init() {
        renderFeed();
        renderGrid();
        updateDisplay();
        setInterval(buffing, 2000);
    }

    function updateDisplay() {
        document.getElementById('sFollowing').innerText = formatNum(stats.following);
        document.getElementById('sFollowers').innerText = formatNum(stats.followers);
        document.getElementById('sLikes').innerText = formatNum(stats.likes);
        if(stats.hasVerify) {
            document.querySelectorAll('.verified-icon').forEach(el => el.style.display = 'inline');
        }
        localStorage.setItem('it_stats', JSON.stringify(stats));
    }

    function buffing() {
        stats.followers += Math.floor(Math.random() * 50) + 10;
        stats.likes += Math.floor(Math.random() * 100);
        updateDisplay();

        // Kiểm tra điều kiện hiện thông báo tích xanh
        if(stats.followers >= 100000 && !stats.hasVerify && !stats.notified) {
            stats.notified = true;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modalVerifyNotify').style.display = 'block';
        }
    }

    function openSurvey() {
        closeModals();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalSurvey').style.display = 'block';
    }

    function finishVerify() {
        stats.hasVerify = true;
        alert("Chúc mừng ICEbreaker! Tích xanh đã được kích hoạt! ✔️");
        closeModals();
        updateDisplay();
        renderFeed(); // Re-render để hiện tích xanh trên video
    }

    function handleUpload() {
        const file = document.getElementById('fileInp').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            posts.push({ id: Date.now(), url: e.target.result, type: file.type, author: ADMIN, likes: '12M' });
            localStorage.setItem('it_posts', JSON.stringify(posts));
            location.reload();
        };
        reader.readAsDataURL(file);
    }

    function renderFeed() {
        const feed = document.getElementById('mainFeed');
        feed.innerHTML = posts.length ? '' : '<div class="post"><h1>Gạt + để đăng clip!</h1></div>';
        posts.slice().reverse().forEach(p => {
            feed.innerHTML += `
                <div class="post">
                    ${p.type.includes('video') ? `<video src="${p.url}" autoplay loop muted playsinline></video>` : `<img src="${p.url}">`}
                    <div class="side-ui">
                        <div class="icon-btn">❤️<div class="stat-label">${p.likes}</div></div>
                        <div class="icon-btn">💬<div class="stat-label">99K</div></div>
                        <div class="icon-btn" onclick="deletePost(${p.id})">...</div>
                    </div>
                    <div class="overlay-ui">
                        <b style="font-size:18px;">@${p.author} ${stats.hasVerify ? '✔️' : ''}</b>
                        <p>Video xu hướng SakuraTok 🌸</p>
                    </div>
                </div>`;
        });
    }

    function renderGrid() {
        const grid = document.getElementById('profileGrid');
        grid.innerHTML = '';
        posts.forEach(p => {
            grid.innerHTML += `<div style="aspect-ratio:3/4; background:#333; overflow:hidden;">${p.type.includes('video') ? `<video src="${p.url}"></video>` : `<img src="${p.url}">`}</div>`;
        });
    }

    function deletePost(id) { if(confirm("Xóa video này?")) { posts = posts.filter(p => p.id != id); localStorage.setItem('it_posts', JSON.stringify(posts)); location.reload(); } }
    function formatNum(num) { if(num >= 1000000) return (num/1000000).toFixed(1) + 'M'; if(num >= 1000) return (num/1000).toFixed(1) + 'K'; return num; }
    function showProfile() { document.getElementById('profilePage').style.display = 'block'; }
    function showHome() { document.getElementById('profilePage').style.display = 'none'; }
    function openUpload() { document.getElementById('overlay').style.display='block'; document.getElementById('modalUpload').style.display='block'; }
    function closeModals() { document.querySelectorAll('.modal, .overlay').forEach(el => el.style.display='none'); }
    
    window.onload = init;
</script>
</body>
</html>
