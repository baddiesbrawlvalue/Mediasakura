<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ICEbreaker🌸 Pro AI</title>
    <style>
        body {
            background-color: #fff0f5; /* Màu nền sakura nhẹ */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #chat-container {
            width: 80%;
            max-width: 800px;
            height: 70vh;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.5);
            overflow-y: auto;
            border: 2px solid #ffb7c5;
            z-index: 10;
        }
        #input-area {
            margin-top: 20px;
            width: 80%;
            max-width: 800px;
            display: flex;
            z-index: 10;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #ffb7c5;
            outline: none;
        }
        button {
            padding: 10px 25px;
            margin-left: 10px;
            border-radius: 25px;
            background: #ffb7c5;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        /* Hiệu ứng hoa rơi */
        .sakura {
            position: absolute;
            top: -10%;
            background: #ffb7c5;
            border-radius: 100% 0 100% 100%;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1 style="color: #d85971;">ICEbreaker🌸 PRO</h1>
    <div id="chat-container">
        <div style="color: #d85971;"><b>ICEbreaker:</b> Chào mày, tao là AI chuyên code Lua. Mày muốn viết gì?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Hỏi code Lua ở đây...">
        <button onclick="sendMessage()">Gửi</button>
    </div>

    <script>
        // Tạo hiệu ứng hoa rơi đơn giản
        for(let i=0; i<30; i++) {
            let flower = document.createElement('div');
            flower.className = 'sakura';
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.width = Math.random() * 10 + 5 + 'px';
            flower.style.height = flower.style.width;
            flower.style.animationDuration = Math.random() * 3 + 2 + 's';
            flower.style.opacity = Math.random();
            document.body.appendChild(flower);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-container');
            if(!input.value) return;

            chat.innerHTML += `<div><b>Mày:</b> ${input.value}</div>`;
            
            // Ở ĐÂY: Mày cần kết nối tới một API (như OpenAI hoặc Gemini API)
            // Vì GitHub Pages không bảo mật được API Key, nên cẩn thận kẻo bị mất tiền.
            chat.innerHTML += `<div style="color: #d85971;"><b>ICEbreaker:</b> Đang suy nghĩ trong 1 giây...</div>`;
            
            input.value = '';
        }
    </script>
</body>
</html>
