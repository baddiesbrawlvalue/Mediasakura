<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICEbreaker🌸 PRO</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: #fff0f5;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Hoa rơi */
        .sakura {
            position: absolute; top: -10%; background: #ffb7c5;
            border-radius: 100% 0 100% 100%;
            animation: fall linear infinite; pointer-events: none; z-index: 1;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        header {
            padding: 15px; text-align: center;
            background: white; border-bottom: 2px solid #ffb7c5;
            color: #d85971; font-weight: bold; z-index: 10;
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            z-index: 10; padding-bottom: 80px; /* Chừa chỗ cho thanh input */
        }

        .msg {
            max-width: 80%; padding: 12px 16px; border-radius: 20px;
            font-size: 15px; line-height: 1.4; position: relative;
        }

        .user-msg {
            align-self: flex-end; background: #d85971; color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            align-self: flex-start; background: white; color: #333;
            border: 1px solid #ffb7c5; border-bottom-left-radius: 4px;
        }

        /* THANH NHẬP LIỆU - ĐÃ FIX */
        .input-box {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 12px; background: white;
            display: flex; align-items: center;
            border-top: 1px solid #ffb7c5; z-index: 100;
        }

        input {
            flex: 1; border: 1px solid #ffb7c5;
            padding: 12px 18px; border-radius: 25px;
            outline: none; font-size: 16px; background: #fffafb;
        }

        #send-btn {
            background: #d85971; color: white; border: none;
            padding: 10px 18px; margin-left: 10px;
            border-radius: 20px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }

        #send-btn:active { transform: scale(0.9); }

        pre {
            background: #282c34; color: #abb2bf; padding: 10px;
            border-radius: 10px; font-size: 13px; overflow-x: auto;
        }
    </style>
</head>
<body>

<header>ICEbreaker🌸 PRO</header>

<div id="chat-window">
    <div class="msg ai-msg">Thấy nút GỬI chưa mày? Tao ghim nó dưới đáy rồi đó. Hỏi code Lua đi tao cân hết!</div>
</div>

<div class="input-box">
    <input type="text" id="user-input" placeholder="Nhắn gì đó cho tao...">
    <button id="send-btn" onclick="handleSend()">GỬI</button>
</div>

<script>
    // Hiệu ứng hoa
    for(let i=0; i<15; i++) {
        let flower = document.createElement('div');
        flower.className = 'sakura';
        flower.style.left = Math.random() * 100 + 'vw';
        flower.style.width = flower.style.height = Math.random() * 7 + 5 + 'px';
        flower.style.animationDuration = Math.random() * 4 + 3 + 's';
        document.body.appendChild(flower);
    }

    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('user-input');

    function handleSend() {
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, 'user-msg');
        input.value = '';

        // Giả lập trả lời
        setTimeout(() => {
            let reply = "Mày muốn làm game baddie trên Roblox bằng Lua hả? Đây là lệnh tạo Part lấp lánh (Sparkles) cho xịn nè:";
            if (text.toLowerCase().includes('lua')) {
                reply += "<pre>local p = Instance.new('Part', game.Workspace)\np.Size = Vector3.new(4,1,4)\nlocal s = Instance.new('Sparkles', p)\ns.SparkleColor = Color3.fromRGB(255, 183, 197)</pre>";
            } else {
                reply = "gen-lang-client-0923127067";
            }
            addMessage(reply, 'ai-msg');
        }, 600);
    }

    function addMessage(content, className) {
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerHTML = content;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
</script>

</body>
</html>
