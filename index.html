<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot của Tao</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 90vh; padding: 20px; background: #121212; color: white; }
        #chat-box { flex-grow: 1; border: 1px solid #444; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        input { padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>Chat với AI của Tao</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Nhập cái gì đó đi mày...">
    <button onclick="sendMessage()">Gửi</button>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // DÁN API KEY CỦA MÀY VÀO ĐÂY
        const API_KEY = "AIzaSyBfoLI4hPFecDMQEor4ockt86YHQZlhIo8"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.sendMessage = async function() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            if (!input.value) return;

            chatBox.innerHTML += `<p><b>Mày:</b> ${input.value}</p>`;
            const message = input.value;
            input.value = "";

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(message);
                const response = await result.response;
                chatBox.innerHTML += `<p><b>AI:</b> ${response.text()}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<p style="color:red">Lỗi rồi mày ơi: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
