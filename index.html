<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SakuraTok v4 - Real World</title>
    <style>
        :root { --pink: #ff4d6d; --gray: #222; }
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        
        /* Chế độ lướt full màn hình */
        #mainFeed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; padding-bottom: 70px; box-sizing: border-box; }
        .post { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { max-height: 100%; width: 100%; object-fit: contain; }

        /* Giao diện trên video */
        .ui-overlay { position: absolute; bottom: 100px; left: 15px; right: 80px; z-index: 10; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .side-bar { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .btn-act { font-size: 30px; cursor: pointer; text-align: center; }
        .label { font-size: 12px; font-weight: bold; }

        /* Thanh Menu cố định ở dưới */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 0.5px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 999; }
        .nav-item { color: #fff; text-align: center; font-size: 11px; opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--pink); }
        .btn-plus { background: #fff; color: #000; padding: 5px 15px; border-radius: 8px; font-size: 20px; font-weight: bold; }

        /* Trang Hồ Sơ */
        #profilePage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 500; overflow-y: auto; padding-bottom: 80px; }
        .prof-head { text-align: center; padding: 40px 20px; border-bottom: 1px solid #eee; }
        .avt-df { width: 90px; height: 90px; border-radius: 50%; background: #eee; object-fit: cover; }
        .stats { display: flex; justify-content: center; gap: 25px; margin: 15px 0; }
        .num { font-weight: bold; display: block; font-size: 18px; }
        
        /* Modal Popup */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 20px; border-radius: 15px; z-index: 1000; width: 85%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .mask { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 900; }
    </style>
</head>
<body>

<div id="mainFeed"></div>

<div class="nav-bottom">
    <div class="nav-item active" onclick="goHome()">🏠<br>Dành cho bạn</div>
    <div class="btn-plus" onclick="openUp()">+</div>
    <div class="nav-item" onclick="goProfile()">👤<br>Hồ sơ</div>
</div>

<div id="profilePage">
    <div class="prof-head">
        <img id="myAvt" src="https://www.thesprucepets.com/thmb/uQn2y3InSTC1ls7p79XU_S0sm_8=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/static-flickr-com-photos-90820679-n00-241517506-6466f284b8d7454291880a656606a237.jpg" class="avt-df">
        <h3 id="myName">ICEbreaker</h3>
        <p id="myBio">Chào mừng đến với SakuraTok 🌸</p>
        <div class="stats">
            <div><span class="num" id="sFlwing">0</span><span style="font-size:12px;color:#999">Đang Follow</span></div>
            <div><span class="num" id="sFlwer">0</span><span style="font-size:12px;color:#999">Follower</span></div>
            <div><span class="num" id="sLike">0</span><span style="font-size:12px;color:#999">Thích</span></div>
        </div>
    </div>
    <div id="myGrid" style="display:grid; grid-template-columns: repeat(3,1fr); gap:2px;"></div>
</div>

<div class="mask" id="mask" onclick="closeAll()"></div>
<div class="modal" id="upModal">
    <h3>Đăng Video</h3>
    <input type="file" id="fileIn" accept="video/*,image/*" style="width:100%">
    <button style="width:100%; background:var(--pink); color:#fff; border:none; padding:10px; margin-top:10px; border-radius:8px;" onclick="doUpload()">TẢI LÊN</button>
</div>

<script>
    const ADMIN = "ICEbreaker";
    // Video kho cho Boss (Mày có thể thay link video tiktok thật vào đây)
    const bossVideos = [
        "https://v.redd.it/3z600pjk95x61/DASH_720.mp4",
        "https://v.redd.it/f9344itj69y61/DASH_480.mp4",
        "https://v.redd.it/u2m5s0f1g9y61/DASH_1080.mp4"
    ];

    let posts = JSON.parse(localStorage.getItem('sak_posts')) || [];
    let myStats = JSON.parse(localStorage.getItem('sak_stats')) || { flwing: 0, flwer: 0, likes: 0 };

    function init() {
        if(posts.length === 0) createBossPosts();
        renderFeed();
        updateUI();
        setInterval(realTimeBuff, 5000); // Tăng view mỗi 5 giây cực chậm
    }

    function createBossPosts() {
        const bosses = [
            {n: "Sakura_Girl", a: "https://via.placeholder.com/50/ffb7c5"},
            {n: "Baddie_Queen", a: "https://via.placeholder.com/50/000000"},
            {n: "Rap_Vibe", a: "https://via.placeholder.com/50/ffffff"}
        ];
        bosses.forEach((b, i) => {
            posts.push({
                id: 'b' + i,
                url: bossVideos[i % bossVideos.length],
                author: b.n,
                avt: b.a,
                likes: Math.floor(Math.random()*10),
                type: 'video/mp4'
            });
        });
        localStorage.setItem('sak_posts', JSON.stringify(posts));
    }

    function renderFeed() {
        const f = document.getElementById('mainFeed');
        f.innerHTML = '';
        posts.slice().reverse().forEach(p => {
            f.innerHTML += `
                <div class="post">
                    <video src="${p.url}" loop autoplay muted playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="side-bar">
                        <div class="btn-act" onclick="addLike('${p.id}')">❤️<div class="label" id="l-${p.id}">${p.likes}</div></div>
                        <div class="btn-act">💬<div class="label">${Math.floor(Math.random()*50)}</div></div>
                        <div class="btn-act">🔁</div>
                    </div>
                    <div class="ui-overlay">
                        <b>@${p.author}</b>
                        <p>Video hay quá mọi người ơi! #xuhuong #sakura</p>
                    </div>
                </div>`;
        });
    }

    function realTimeBuff() {
        // Tăng view cực chậm cho ICEbreaker
        posts.forEach(p => {
            if(p.author === ADMIN) {
                p.likes += Math.floor(Math.random() * 2); // Chỉ tăng 0-1 like mỗi 5 giây
                let lEl = document.getElementById(`l-${p.id}`);
                if(lEl) lEl.innerText = p.likes;
            }
        });
        myStats.flwer += (Math.random() > 0.9 ? 1 : 0); // Thỉnh thoảng mới có 1 follow
        updateUI();
    }

    function doUpload() {
        const file = document.getElementById('fileIn').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            posts.push({ id: Date.now(), url: e.target.result, author: ADMIN, likes: 0, type: file.type });
            localStorage.setItem('sak_posts', JSON.stringify(posts));
            location.reload();
        };
        reader.readAsDataURL(file);
    }

    function updateUI() {
        document.getElementById('sFlwing').innerText = myStats.flwing;
        document.getElementById('sFlwer').innerText = myStats.flwer;
        document.getElementById('sLike').innerText = myStats.likes;
        localStorage.setItem('sak_stats', JSON.stringify(myStats));
    }

    function goProfile() { document.getElementById('profilePage').style.display='block'; }
    function goHome() { document.getElementById('profilePage').style.display='none'; }
    function openUp() { document.getElementById('upModal').style.display='block'; document.getElementById('mask').style.display='block'; }
    function closeAll() { document.querySelectorAll('.modal, .mask').forEach(e => e.style.display='none'); }

    window.onload = init;
</script>
</body>
</html>
