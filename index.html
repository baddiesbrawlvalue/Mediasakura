<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Script Pro - Dashboard</title>
    <style>
        :root { --primary: #00ffa3; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        
        h2 { text-align: center; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }

        /* Thanh tìm kiếm cao cấp */
        .search-wrapper { position: relative; margin-bottom: 30px; }
        #searchBar {
            width: 100%; padding: 15px 20px; border-radius: 12px; border: 1px solid #333;
            background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 16px;
            transition: 0.3s; box-sizing: border-box;
        }
        #searchBar:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 163, 0.2); }

        /* Lưới hiển thị Card */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .script-card {
            background: var(--card); border-radius: 16px; padding: 20px;
            border: 1px solid #222; position: relative; transition: 0.3s;
        }
        .script-card:hover { transform: translateY(-5px); border-color: #444; }

        .tag {
            font-size: 10px; padding: 3px 8px; border-radius: 4px;
            text-transform: uppercase; font-weight: bold; float: right;
        }
        .tag-working { background: rgba(0, 255, 163, 0.2); color: var(--primary); }
        .tag-patched { background: rgba(255, 60, 60, 0.2); color: #ff3c3c; }

        .game-title { font-size: 1.1em; font-weight: 600; margin-bottom: 15px; display: block; }
        
        .code-box {
            background: #000; padding: 12px; border-radius: 8px;
            font-family: 'Fira Code', monospace; font-size: 12px;
            margin-bottom: 15px; border: 1px solid #222;
            color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .copy-btn {
            width: 100%; background: var(--primary); color: #000; border: none;
            padding: 10px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .copy-btn:hover { background: #00d689; }

        /* Thông báo nhỏ */
        #toast {
            visibility: hidden; min-width: 200px; background-color: var(--primary);
            color: #000; text-align: center; border-radius: 8px; padding: 12px;
            position: fixed; z-index: 1; bottom: 30px; font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h2>LUA SCRIPT HUB</h2>
    
    <div class="search-wrapper">
        <input type="text" id="searchBar" placeholder="Gõ tên game mày muốn tìm..." onkeyup="filterScripts()">
    </div>

    <div class="grid" id="scriptList">
        <!-- Script 1 -->
        <div class="script-card">
            <span class="tag tag-working">Working</span>
            <span class="game-title">Murder Mystery 2</span>
            <div class="code-box" id="c1">loadstring(game:HttpGet("https://raw.githubusercontent.com/mm2-best"))()</div>
            <button class="copy-btn" onclick="copyCode('c1')">COPY SCRIPT</button>
        </div>

        <!-- Script 2 -->
        <div class="script-card">
            <span class="tag tag-patched">Patched</span>
            <span class="game-title">Blox Fruit</span>
            <div class="code-box" id="c2">loadstring(game:HttpGet("https://blox-hub.com/main"))()</div>
            <button class="copy-btn" onclick="copyCode('c2')" style="opacity:0.5; cursor:not-allowed;">FIXING...</button>
        </div>
    </div>
</div>

<div id="toast">Đã copy rồi đó mày! 🚀</div>

<script>
    function copyCode(id) {
        const code = document.getElementById(id).innerText;
        navigator.clipboard.writeText(code).then(() => {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        });
    }

    function filterScripts() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.getElementsByClassName('script-card');
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].querySelector('.game-title').innerText.toLowerCase();
            cards[i].style.display = title.includes(input) ? "" : "none";
        }
    }
</script>

</body>
</html>
